<!DOCTYPE html>
<html>
<head>
<title>Bitcoin Price Predictor</title>
<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>Bitcoin Price Prediction</h1>

<input id="open" placeholder="Open Price">
<input id="high" placeholder="High Price">
<input id="low" placeholder="Low Price">
<input id="volume" placeholder="Volume">

<button onclick="predict()">Predict</button>

<div id="prediction"></div>
<div id="suggestion"></div>

<canvas id="chart"></canvas>

</div>

<script src="/static/script.js"></script>

</body>
</html>
