<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>BTC Price Predictor</title>

<link rel="stylesheet" href="static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Bitcoin Price Prediction</h1>

<div class="input-box">

<input type="number" id="open" placeholder="Open Price">

<input type="number" id="high" placeholder="High Price">

<input type="number" id="low" placeholder="Low Price">

<input type="number" id="volume" placeholder="Volume">

<button onclick="predict()">Predict</button>

</div>

<div class="result">

<h2 id="prediction"></h2>
<h3 id="suggestion"></h3>

</div>

<canvas id="chart"></canvas>

</div>

<script src="static/script.js"></script>

</body>
</html>
